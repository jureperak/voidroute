services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${SERVER_BASE_PATH}/caddy/data:/data
      - ${SERVER_BASE_PATH}/caddy/config:/config
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - VOIDROUTE_VPN_SUBNET=${VOIDROUTE_VPN_SUBNET}
    networks:
      - voidroute

  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    volumes:
      - ${SERVER_BASE_PATH}/homepage/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ${SERVER_BASE_PATH}/homepage/images:/app/public/images
    environment:
      HOMEPAGE_ALLOWED_HOSTS: homepage.${SERVER_NAME}
    networks:
      - voidroute

  jellyfin:
    image: lscr.io/linuxserver/jellyfin
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_ROOT}/config/jellyfin:/config
      - ${MEDIA_ROOT}/media/movies:/media/movies
      - ${MEDIA_ROOT}/media/series:/media/series
    networks:
      - voidroute

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ${MEDIA_ROOT}/config/qbittorrent:/config
      - ${MEDIA_ROOT}/downloads:/downloads
    networks:
      - voidroute

  sonarr:
    image: lscr.io/linuxserver/sonarr
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_ROOT}/config/sonarr:/config
      - ${MEDIA_ROOT}/media:/media
      - ${MEDIA_ROOT}/downloads:/downloads
    networks:
      - voidroute

  radarr:
    image: lscr.io/linuxserver/radarr
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_ROOT}/config/radarr:/config
      - ${MEDIA_ROOT}/media:/media
      - ${MEDIA_ROOT}/downloads:/downloads
    networks:
      - voidroute

  prowlarr:
    image: lscr.io/linuxserver/prowlarr
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_ROOT}/config/prowlarr:/config
    networks:
      - voidroute

  bazarr:
    image: lscr.io/linuxserver/bazarr
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${MEDIA_ROOT}/config/bazarr:/config
      - ${MEDIA_ROOT}/media:/media
    networks:
      - voidroute

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    networks:
      - voidroute

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - ${MEDIA_ROOT}/config/jellyseerr:/app/config
    networks:
      - voidroute

networks:
  voidroute:
    external: true
    name: ${DOCKER_NETWORK}
