name: Write .env
description: Writes all environment variables to a .env file on the server

inputs:
  SERVER_NAME:
    required: true
  SERVER_BASE_PATH:
    required: true
  DOCKER_NETWORK:
    required: true
  VOIDROUTE_VPN_SUBNET:
    required: true
  MEDIA_ROOT:
    required: true
  TZ:
    required: true
  PUID:
    required: true
  PGID:
    required: true
  JELLYFIN_API_KEY:
    required: true
  QBITTORRENT_USERNAME:
    required: true
  QBITTORRENT_PASSWORD:
    required: true
  SONARR_API_KEY:
    required: true
  RADARR_API_KEY:
    required: true
  PROWLARR_API_KEY:
    required: true
  BAZARR_API_KEY:
    required: true
  JELLYSEERR_API_KEY:
    required: true
  FIREFLY_API_KEY:
    required: true
  FIREFLY_APP_KEY:
    required: true
  FIREFLY_DB_PASSWORD:
    required: true
  POSTGRES_ADMIN_PASSWORD:
    required: true

runs:
  using: composite
  steps:
    - name: Write .env file
      shell: bash
      run: |
        mkdir -p "${{ inputs.SERVER_BASE_PATH }}"
        cat > "${{ inputs.SERVER_BASE_PATH }}/.env" << 'EOF'
        SERVER_NAME=${{ inputs.SERVER_NAME }}
        SERVER_BASE_PATH=${{ inputs.SERVER_BASE_PATH }}
        DOCKER_NETWORK=${{ inputs.DOCKER_NETWORK }}
        VOIDROUTE_VPN_SUBNET=${{ inputs.VOIDROUTE_VPN_SUBNET }}
        MEDIA_ROOT=${{ inputs.MEDIA_ROOT }}
        TZ=${{ inputs.TZ }}
        PUID=${{ inputs.PUID }}
        PGID=${{ inputs.PGID }}
        JELLYFIN_API_KEY=${{ inputs.JELLYFIN_API_KEY }}
        QBITTORRENT_USERNAME=${{ inputs.QBITTORRENT_USERNAME }}
        QBITTORRENT_PASSWORD=${{ inputs.QBITTORRENT_PASSWORD }}
        SONARR_API_KEY=${{ inputs.SONARR_API_KEY }}
        RADARR_API_KEY=${{ inputs.RADARR_API_KEY }}
        PROWLARR_API_KEY=${{ inputs.PROWLARR_API_KEY }}
        BAZARR_API_KEY=${{ inputs.BAZARR_API_KEY }}
        JELLYSEERR_API_KEY=${{ inputs.JELLYSEERR_API_KEY }}
        FIREFLY_API_KEY=${{ inputs.FIREFLY_API_KEY }}
        FIREFLY_APP_KEY=${{ inputs.FIREFLY_APP_KEY }}
        FIREFLY_DB_PASSWORD=${{ inputs.FIREFLY_DB_PASSWORD }}
        POSTGRES_ADMIN_PASSWORD=${{ inputs.POSTGRES_ADMIN_PASSWORD }}
        EOF
        sed -i 's/^[[:space:]]*//' "${{ inputs.SERVER_BASE_PATH }}/.env"
        chmod 600 "${{ inputs.SERVER_BASE_PATH }}/.env"
