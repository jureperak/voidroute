name: Manual Deploy Postgres

on:
  workflow_dispatch:

env:
  ENV_FILE: ${{ vars.SERVER_BASE_PATH }}/.env

jobs:
  deploy:
    runs-on: self-hosted
    environment: Production

    steps:
      - uses: actions/checkout@v5

      - name: Write .env
        uses: ./.github/actions/write-env
        with:
          SERVER_NAME: ${{ vars.SERVER_NAME }}
          SERVER_BASE_PATH: ${{ vars.SERVER_BASE_PATH }}
          DOCKER_NETWORK: ${{ vars.DOCKER_NETWORK }}
          CADDY_CONTAINER: ${{ vars.CADDY_CONTAINER }}
          HOMEPAGE_CONTAINER: ${{ vars.HOMEPAGE_CONTAINER }}
          TORTUGA_CONTAINER: ${{ vars.TORTUGA_CONTAINER }}
          BLACKPEARL_CONTAINER: ${{ vars.BLACKPEARL_CONTAINER }}
          SONARR_CONTAINER: ${{ vars.SONARR_CONTAINER }}
          HOMEPAGE_SERVER_PREFIX: ${{ vars.HOMEPAGE_SERVER_PREFIX }}
          ADGUARD_SERVER_PREFIX: ${{ vars.ADGUARD_SERVER_PREFIX }}
          TORTUGA_SERVER_PREFIX: ${{ vars.TORTUGA_SERVER_PREFIX }}
          BLACKPEARL_SERVER_PREFIX: ${{ vars.BLACKPEARL_SERVER_PREFIX }}
          SONARR_SERVER_PREFIX: ${{ vars.SONARR_SERVER_PREFIX }}
          VOIDROUTE_VPN_SUBNET: ${{ vars.VOIDROUTE_VPN_SUBNET }}
          MEDIA_ROOT: ${{ vars.MEDIA_ROOT }}
          TZ: ${{ vars.TZ }}
          PUID: ${{ vars.PUID }}
          PGID: ${{ vars.PGID }}
          PG_CONTAINER: ${{ vars.PG_CONTAINER }}
          PG_VOLUME: ${{ vars.PG_VOLUME }}
          PG_PORT_BIND: ${{ vars.PG_PORT_BIND }}
          TORTUGA_API_KEY: ${{ secrets.TORTUGA_API_KEY }}
          BLACKPEARL_USERNAME: ${{ secrets.BLACKPEARL_USERNAME }}
          BLACKPEARL_PASSWORD: ${{ secrets.BLACKPEARL_PASSWORD }}
          SONARR_API_KEY: ${{ secrets.SONARR_API_KEY }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}

      - name: Ensure docker network exists
        run: |
          source "$ENV_FILE"
          docker network inspect "$DOCKER_NETWORK" >/dev/null 2>&1 || \
          docker network create "$DOCKER_NETWORK"

      - name: Ensure postgres volume exists
        run: |
          source "$ENV_FILE"
          docker volume inspect "$PG_VOLUME" >/dev/null 2>&1 || \
          docker volume create "$PG_VOLUME"

      - name: Pull Postgres image
        run: docker pull postgres:16

      - name: Stop/remove old postgres container
        run: |
          source "$ENV_FILE"
          docker rm -f "$PG_CONTAINER" 2>/dev/null || true

      - name: Run Postgres
        run: |
          source "$ENV_FILE"
          docker run -d \
            --name "$PG_CONTAINER" \
            --network "$DOCKER_NETWORK" \
            --restart unless-stopped \
            -p "$PG_PORT_BIND" \
            -e POSTGRES_PASSWORD="$POSTGRES_ADMIN_PASSWORD" \
            -v "$PG_VOLUME:/var/lib/postgresql/data" \
            postgres:16

      - name: Wait for Postgres
        run: |
          source "$ENV_FILE"
          for i in {1..30}; do
            docker exec "$PG_CONTAINER" pg_isready -U postgres && exit 0
            sleep 2
          done
          echo "Postgres not ready" && exit 1
