name: Deploy entrypoint

on:
  workflow_dispatch:
  push:
    paths:
      - infra/caddy/**

jobs:
  deploy:
    runs-on: self-hosted
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure docker network exists
        run: |
          docker network inspect "${{ vars.DOCKER_NETWORK }}" >/dev/null 2>&1 || \
          docker network create "${{ vars.DOCKER_NETWORK }}"

      - name: Install Caddyfile (envsubst)
        env:
          SERVER_NAME: ${{ vars.SERVER_NAME }}
          DASHBOARD_SERVER_PREFIX: ${{ vars.DASHBOARD_SERVER_PREFIX }}
          TORTUGA_SERVER_PREFIX: ${{ vars.TORTUGA_SERVER_PREFIX }}
          BLACKPEARL_SERVER_PREFIX: ${{ vars.BLACKPEARL_SERVER_PREFIX }}
        run: |
          mkdir -p "${{ vars.SERVER_BASE_PATH }}/caddy"

          envsubst '${SERVER_NAME} ${DASHBOARD_SERVER_PREFIX} ${TORTUGA_SERVER_PREFIX} ${BLACKPEARL_SERVER_PREFIX}' \
            < infra/caddy/caddyfile.template \
            > "${{ vars.SERVER_BASE_PATH }}/caddy/Caddyfile"

      - name: Stop and remove old container
        run: |
          docker stop "${{ vars.CADDY_CONTAINER }}" || true
          docker rm "${{ vars.CADDY_CONTAINER }}" || true

      - name: Recreate caddy container
        run: |
          docker rm -f "${{ vars.CADDY_CONTAINER }}" 2>/dev/null || true

          docker run -d \
            --name "${{ vars.CADDY_CONTAINER }}" \
            --network "${{ vars.DOCKER_NETWORK }}" \
            -p 80:80 -p 443:443 \
            -v "${{ vars.SERVER_BASE_PATH }}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -v "${{ vars.SERVER_BASE_PATH }}/caddy/data:/data" \
            -v "${{ vars.SERVER_BASE_PATH }}/caddy/config:/config" \
            --restart unless-stopped \
            caddy:2

      - name: Status
        run: |
          docker ps --filter "name=${{ vars.CADDY_CONTAINER }}"
          docker logs "${{ vars.CADDY_CONTAINER }}" --tail 20
