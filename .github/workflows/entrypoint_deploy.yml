name: Deploy entrypoint

on:
  workflow_dispatch:
  push:
    paths:
      - infra/caddy/**

jobs:
  deploy:
    runs-on: self-hosted
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure docker network exists
        run: |
          docker network inspect "${{ vars.DOCKER_NETWORK }}" >/dev/null 2>&1 || \
          docker network create "${{ vars.DOCKER_NETWORK }}"

      - name: Install Caddyfile (envsubst)
        env:
          SERVER_NAME: ${{ vars.SERVER_NAME }}
          HOMEPAGE_SERVER_PREFIX: ${{ vars.HOMEPAGE_SERVER_PREFIX }}
          ADGUARD_SERVER_PREFIX: ${{ vars.ADGUARD_SERVER_PREFIX }}
          TORTUGA_SERVER_PREFIX: ${{ vars.TORTUGA_SERVER_PREFIX }}
          BLACKPEARL_SERVER_PREFIX: ${{ vars.BLACKPEARL_SERVER_PREFIX }}
          VOIDROUTE_VPN_SUBNET: ${{ vars.VOIDROUTE_VPN_SUBNET }}
          SONARR_SERVER_PREFIX: ${{ vars.SONARR_SERVER_PREFIX }}
        run: |
          mkdir -p "${{ vars.SERVER_BASE_PATH }}/caddy"

          envsubst '${SERVER_NAME} ${HOMEPAGE_SERVER_PREFIX} ${ADGUARD_SERVER_PREFIX} ${TORTUGA_SERVER_PREFIX} ${BLACKPEARL_SERVER_PREFIX} ${VOIDROUTE_VPN_SUBNET} ${SONARR_SERVER_PREFIX}' \
            < infra/caddy/caddyfile.template \
            > "${{ vars.SERVER_BASE_PATH }}/caddy/Caddyfile"

      - name: Stop and remove old container
        run: |
          docker stop "${{ vars.CADDY_CONTAINER }}" || true
          docker rm "${{ vars.CADDY_CONTAINER }}" || true

      - name: Recreate caddy container
        run: |
          docker rm -f "${{ vars.CADDY_CONTAINER }}" 2>/dev/null || true

          docker run -d \
            --name "${{ vars.CADDY_CONTAINER }}" \
            --network "${{ vars.DOCKER_NETWORK }}" \
            -p 80:80 -p 443:443 \
            -v "${{ vars.SERVER_BASE_PATH }}/caddy/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -v "${{ vars.SERVER_BASE_PATH }}/caddy/data:/data" \
            -v "${{ vars.SERVER_BASE_PATH }}/caddy/config:/config" \
            --restart unless-stopped \
            caddy:2

      - name: Status
        run: |
          docker ps --filter "name=${{ vars.CADDY_CONTAINER }}"
          docker logs "${{ vars.CADDY_CONTAINER }}" --tail 20

      - name: Generate Homepage config
        env:
          SERVER_NAME: ${{ vars.SERVER_NAME }}
          TORTUGA_SERVER_PREFIX: ${{ vars.TORTUGA_SERVER_PREFIX }}
          TORTUGA_API_KEY: ${{ secrets.TORTUGA_API_KEY }}
          BLACKPEARL_SERVER_PREFIX: ${{ vars.BLACKPEARL_SERVER_PREFIX }}
          BLACKPEARL_USERNAME: ${{ secrets.BLACKPEARL_USERNAME }}
          BLACKPEARL_PASSWORD: ${{ secrets.BLACKPEARL_PASSWORD }}
          ADGUARD_SERVER_PREFIX: ${{ vars.ADGUARD_SERVER_PREFIX }}
          SONARR_SERVER_PREFIX: ${{ vars.SONARR_SERVER_PREFIX }}
        run: |
          mkdir -p "${{ vars.SERVER_BASE_PATH }}/homepage/config"
      
          # static files
          cp infra/homepage/config/settings.yaml "${{ vars.SERVER_BASE_PATH }}/homepage/config/" || true
          cp infra/homepage/config/widgets.yaml "${{ vars.SERVER_BASE_PATH }}/homepage/config/" || true
          cp infra/homepage/config/docker.yaml "${{ vars.SERVER_BASE_PATH }}/homepage/config/" || true

          # templates → generate
          envsubst '${SERVER_NAME} ${TORTUGA_SERVER_PREFIX} ${TORTUGA_API_KEY} ${BLACKPEARL_SERVER_PREFIX} ${BLACKPEARL_USERNAME} ${BLACKPEARL_PASSWORD} ${SONARR_SERVER_PREFIX}' \
            < infra/homepage/config/services.yaml.template \
            > "${{ vars.SERVER_BASE_PATH }}/homepage/config/services.yaml"
      
          envsubst '${SERVER_NAME} ${ADGUARD_SERVER_PREFIX} ${TORTUGA_SERVER_PREFIX} ${BLACKPEARL_SERVER_PREFIX}' \
            < infra/homepage/config/bookmarks.yaml.template \
            > "${{ vars.SERVER_BASE_PATH }}/homepage/config/bookmarks.yaml"

          envsubst '${SERVER_NAME} ${SONARR_SERVER_PREFIX}' \
            < infra/homepage/config/widgets.yaml.template \
            > "${{ vars.SERVER_BASE_PATH }}/homepage/config/widgets.yaml"“
         
      - name: Copy docker-compose
        run: |
          mkdir -p "${{ vars.SERVER_BASE_PATH }}/homepage"
          cp infra/homepage/docker-compose.yml "${{ vars.SERVER_BASE_PATH }}/homepage/"

      - name: Start Homepage
        env:
          SERVER_NAME: ${{ vars.SERVER_NAME }}
          HOMEPAGE_SERVER_PREFIX: ${{ vars.HOMEPAGE_SERVER_PREFIX }}
          DOCKER_NETWORK: ${{ vars.DOCKER_NETWORK }}
        run: |
          cd "${{ vars.SERVER_BASE_PATH }}/homepage"
          docker compose up -d
