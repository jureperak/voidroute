name: Deploy

on:
  workflow_dispatch:
  push:
    paths:
      - infra/**

env:
  ENV_FILE: ${{ vars.SERVER_BASE_PATH }}/.env

jobs:
  deploy:
    runs-on: self-hosted
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write .env
        uses: ./.github/actions/write-env
        with:
          SERVER_NAME: ${{ vars.SERVER_NAME }}
          SERVER_BASE_PATH: ${{ vars.SERVER_BASE_PATH }}
          DOCKER_NETWORK: ${{ vars.DOCKER_NETWORK }}
          VOIDROUTE_VPN_SUBNET: ${{ vars.VOIDROUTE_VPN_SUBNET }}
          MEDIA_ROOT: ${{ vars.MEDIA_ROOT }}
          TZ: ${{ vars.TZ }}
          PUID: ${{ vars.PUID }}
          PGID: ${{ vars.PGID }}
          JELLYFIN_API_KEY: ${{ secrets.JELLYFIN_API_KEY }}
          QBITTORRENT_USERNAME: ${{ secrets.QBITTORRENT_USERNAME }}
          QBITTORRENT_PASSWORD: ${{ secrets.QBITTORRENT_PASSWORD }}
          SONARR_API_KEY: ${{ secrets.SONARR_API_KEY }}
          RADARR_API_KEY: ${{ secrets.RADARR_API_KEY }}
          PROWLARR_API_KEY: ${{ secrets.PROWLARR_API_KEY }}
          BAZARR_API_KEY: ${{ secrets.BAZARR_API_KEY }}
          JELLYSEERR_API_KEY: ${{ secrets.JELLYSEERR_API_KEY }}
          POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}

      - name: Ensure docker network exists
        run: |
          source "$ENV_FILE"
          docker network inspect "$DOCKER_NETWORK" >/dev/null 2>&1 || \
          docker network create "$DOCKER_NETWORK"

      - name: Generate Homepage config
        run: |
          set -a && source "$ENV_FILE" && set +a
          mkdir -p "$SERVER_BASE_PATH/homepage/config"

          cp infra/homepage/config/settings.yaml "$SERVER_BASE_PATH/homepage/config/"
          cp infra/homepage/config/docker.yaml "$SERVER_BASE_PATH/homepage/config/"
          cp infra/homepage/config/widgets.yaml "$SERVER_BASE_PATH/homepage/config/"

          envsubst < infra/homepage/config/services.yaml.template > "$SERVER_BASE_PATH/homepage/config/services.yaml"
          envsubst < infra/homepage/config/bookmarks.yaml.template > "$SERVER_BASE_PATH/homepage/config/bookmarks.yaml"

      - name: Deploy stack
        run: |
          cd infra
          docker compose --env-file "$ENV_FILE" pull
          docker compose --env-file "$ENV_FILE" up -d --force-recreate --remove-orphans

          docker image prune -f
          docker container prune -f

      - name: Status
        run: docker compose -f infra/docker-compose.yml --env-file "$ENV_FILE" ps
